<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Piedra, Papel o Tijera</title>
</head>
<body>
    <h1> <img src="./img/logo.png" alt="logo"> Piedra, Papel o Tijera</h1>
    <div class="game">
        <div class="elegir">
            <button id="piedra" class="choice">🪨Piedra</button>
            <button id="papel" class="choice">🫲Papel</button>
            <button id="tijera" class="choice">✂️Tijera</button>
        </div>
        <div class="resultado">
            <p id="usuario-elegir">Tu elección: </p>
            <p id="ordenador-elige">Elección de la computadora: </p>
            <div class="box-outcome">
            <p id="outcome">Resultado: </p>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>
</html>
